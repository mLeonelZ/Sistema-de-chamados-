spring:
  application:
    name: chamados
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chamados}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
server:
  port: ${SERVER_PORT:8080}
app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:super-secret-change-me-super-secret-change-me}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}
